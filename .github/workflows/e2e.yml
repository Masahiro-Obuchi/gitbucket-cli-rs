name: E2E

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Bootstrap Docker GitBucket fixture
        run: ./scripts/e2e/bootstrap.sh
      - name: Verify GitBucket E2E env file
        run: test -s .tmp/e2e/runtime.env
      - name: Export GitBucket E2E env
        run: cat .tmp/e2e/runtime.env >> "$GITHUB_ENV"
      - name: Run Docker-backed E2E smoke tests
        run: cargo test --locked --test e2e_smoke -- --ignored --nocapture
      - name: Show GitBucket logs on failure
        if: failure()
        run: docker compose -p gb-e2e -f docker/e2e/compose.yaml logs --no-color
      - name: Tear down Docker GitBucket fixture
        if: always()
        run: ./scripts/e2e/down.sh
